      done: &quot;#2f9e44&quot;,
      needCheck: &quot;#1c7ed6&quot;,
      notVisited: &quot;#f08c00&quot;,
      other: &quot;#7950f2&quot;,
      empty: &quot;#ced4da&quot;
    };

    const statusMarkerColors = {
      open: &quot;#2f9e44&quot;,
      break: &quot;#f08c00&quot;,
      closed: &quot;#868e96&quot;,
      empty: &quot;#8b5e3c&quot;
    };

    function getCheckPinColor(type) {
      const value = String(type || &quot;&quot;).trim();

      if (!value) return checkMarkerColors.empty;
      if (value === &quot;1팀&quot;) return checkMarkerColors.done;
      if (value === &quot;2팀&quot;) return checkMarkerColors.needCheck;
      if (value === &quot;3&quot;) return checkMarkerColors.notVisited;
      if (value === &quot;기타&quot;) return checkMarkerColors.other;

      return checkMarkerColors.other;
    }

    function parseTimeRange(text) {
      const value = String(text || &quot;&quot;).trim();
      const match = value.match(/^(\d{2}:\d{2})~(\d{2}:\d{2})$/);
      if (!match) return null;

      const [startH, startM] = match[1].split(&quot;:&quot;).map(Number);
      const [endH, endM] = match[2].split(&quot;:&quot;).map(Number);

      return {
        start: startH * 60 + startM,
        end: endH * 60 + endM
      };
    }

    function formatRemainTime(minutes) {
      const safeMinutes = Math.max(0, Math.floor(minutes));

      if (safeMinutes &lt;= 0) return &quot;곧&quot;;

      const h = Math.floor(safeMinutes / 60);
      const m = safeMinutes % 60;

      if (h &gt; 0 &amp;&amp; m &gt; 0) return `${h}시간 ${m}분`;
      if (h &gt; 0) return `${h}시간`;
      return `${m}분`;
    }

    function getStatusClass(status) {
      if (status === &quot;운영중&quot;) return &quot;status-open&quot;;
      if (status === &quot;브레이크타임&quot;) return &quot;status-break&quot;;
      if (status === &quot;정보없음&quot;) return &quot;status-empty&quot;;
      return &quot;status-closed&quot;;
    }

    function getStoreStatus(store) {
      const now = new Date();
      const dayNames = [&quot;일&quot;, &quot;월&quot;, &quot;화&quot;, &quot;수&quot;, &quot;목&quot;, &quot;금&quot;, &quot;토&quot;];
      const today = dayNames[now.getDay()];
      const nowMinutes = now.getHours() * 60 + now.getMinutes();

      const operatingDays = String(store.operating_days || &quot;&quot;).trim();
      const operatingHours = String(store.operating_hours || &quot;&quot;).trim();
      const breakTime = String(store.break_time || &quot;&quot;).trim();

      if (!operatingDays || !operatingHours) {
        return {
          status: &quot;정보없음&quot;,
          message: &quot;운영 정보 없음&quot;
        };
      }

      const validDays = operatingDays
        .split(&quot;,&quot;)
        .map(v =&gt; v.trim())
        .filter(Boolean);

      const range = parseTimeRange(operatingHours);
      if (!range) {
        return {
          status: &quot;정보없음&quot;,
          message: &quot;운영 정보 없음&quot;
        };
      }

      if (!validDays.includes(today)) {
        return {
          status: &quot;미운영&quot;,
          message: &quot;운영 종료&quot;
        };
      }

      if (nowMinutes &lt; range.start || nowMinutes &gt; range.end) {
        return {
          status: &quot;미운영&quot;,
          message: &quot;운영 종료&quot;
        };
      }

      const breakRange = breakTime ? parseTimeRange(breakTime) : null;

      if (breakRange &amp;&amp; nowMinutes &gt;= breakRange.start &amp;&amp; nowMinutes &lt;= breakRange.end) {
        return {
          status: &quot;브레이크타임&quot;,
          message: `${formatRemainTime(breakRange.end - nowMinutes)} 후 운영 재개`
        };
      }

      if (breakRange &amp;&amp; nowMinutes &lt; breakRange.start) {
        return {
          status: &quot;운영중&quot;,
          message: `${formatRemainTime(breakRange.start - nowMinutes)} 후 브레이크타임`
        };
      }

      return {
        status: &quot;운영중&quot;,
        message: `${formatRemainTime(range.end - nowMinutes)} 후 운영 종료`
      };
    }

    function isStoreOpen(store) {
      const statusInfo = getStoreStatus(store);
      return statusInfo.status === &quot;운영중&quot;;
    }

    function getOpenStatusPinColor(store) {
      const statusInfo = getStoreStatus(store);

      if (statusInfo.status === &quot;운영중&quot;) return statusMarkerColors.open;
      if (statusInfo.status === &quot;브레이크타임&quot;) return statusMarkerColors.break;
      if (statusInfo.status === &quot;미운영&quot;) return statusMarkerColors.closed;
      return statusMarkerColors.empty;
    }

    function getPinPriority(store) {
      if (currentPinMode === &quot;open&quot;) {
        const status = getStoreStatus(store).status;

        if (status === &quot;정보없음&quot;) return 0;
        if (status === &quot;미운영&quot;) return 1;
        if (status === &quot;브레이크타임&quot;) return 2;
        if (status === &quot;운영중&quot;) return 3;
        return 0;
      }

      const value = String(store.brand || &quot;&quot;).trim();
      if (value === &quot;1팀&quot;) return 4;
      if (value === &quot;2팀&quot;) return 3;
      if (value === &quot;3팀&quot;) return 2;
      if (value === &quot;기타&quot;) return 1;
      if (!value) return 0;
      return 3;
    }

    function getMarkerImage(store) {
      if (currentPinMode === &quot;open&quot;) {
        return makeMarkerImage(getOpenStatusPinColor(store));
      }
      return makeMarkerImage(getCheckPinColor(store.brand));
    }

    function normalizeText(text) {
      return String(text || &quot;&quot;).toLowerCase().replace(/\s+/g, &quot;&quot;).trim();
    }

    function createUniqueOptions(arr) {
      return [...new Set(arr.filter(Boolean))].sort((a, b) =&gt; a.localeCompare(b, &quot;ko&quot;));
    }

    function extractRegion(address) {
      const text = String(address || &quot;&quot;).trim();
      if (!text) return &quot;기타&quot;;
      if (text.startsWith(&quot;서울&quot;)) return &quot;서울&quot;;
      if (text.startsWith(&quot;경기&quot;)) return &quot;경기&quot;;
      if (text.startsWith(&quot;인천&quot;)) return &quot;인천&quot;;
      if (text.startsWith(&quot;부산&quot;)) return &quot;부산&quot;;
      if (text.startsWith(&quot;대구&quot;)) return &quot;대구&quot;;
      if (text.startsWith(&quot;광주&quot;)) return &quot;광주&quot;;
      if (text.startsWith(&quot;대전&quot;)) return &quot;대전&quot;;
      if (text.startsWith(&quot;울산&quot;)) return &quot;울산&quot;;
      if (text.startsWith(&quot;세종&quot;)) return &quot;세종&quot;;
      if (text.startsWith(&quot;강원&quot;)) return &quot;강원&quot;;
      if (text.startsWith(&quot;충북&quot;)) return &quot;충북&quot;;
      if (text.startsWith(&quot;충남&quot;)) return &quot;충남&quot;;
      if (text.startsWith(&quot;전북&quot;)) return &quot;전북&quot;;
      if (text.startsWith(&quot;전남&quot;)) return &quot;전남&quot;;
      if (text.startsWith(&quot;경북&quot;)) return &quot;경북&quot;;
      if (text.startsWith(&quot;경남&quot;)) return &quot;경남&quot;;
      if (text.startsWith(&quot;제주&quot;)) return &quot;제주&quot;;
      return text.split(&quot; &quot;)[0] || &quot;기타&quot;;
    }

    function rebuildStoresForFilter() {
      storesForFilter = stores.map(store =&gt; ({
        ...store,
        region: extractRegion(store.address)
      }));
    }

    function isMobileDevice() {
      return window.matchMedia(&quot;(max-width: 768px)&quot;).matches;
    }

    function relayoutMapSafely() {
      clearTimeout(relayoutTimer);
      relayoutTimer = setTimeout(() =&gt; {
        map.relayout();
      }, 120);
    }

    function renderMarkerLegend() {
      const titleEl = document.getElementById(&quot;markerLegendTitle&quot;);
      const listEl = document.getElementById(&quot;markerLegendList&quot;);
      if (!titleEl || !listEl) return;

      if (currentPinMode === &quot;open&quot;) {
        titleEl.textContent = &quot;운영상태 핀 안내&quot;;
        listEl.innerHTML = `
          &lt;div class=&quot;marker-legend-item&quot;&gt;
            &lt;span class=&quot;marker-dot&quot; style=&quot;background:${statusMarkerColors.open}&quot;&gt;&lt;/span&gt;
            &lt;span&gt;운영중&lt;/span&gt;
          &lt;/div&gt;
          &lt;div class=&quot;marker-legend-item&quot;&gt;
            &lt;span class=&quot;marker-dot&quot; style=&quot;background:${statusMarkerColors.break}&quot;&gt;&lt;/span&gt;
            &lt;span&gt;브레이크타임&lt;/span&gt;
          &lt;/div&gt;
          &lt;div class=&quot;marker-legend-item&quot;&gt;
            &lt;span class=&quot;marker-dot&quot; style=&quot;background:${statusMarkerColors.closed}&quot;&gt;&lt;/span&gt;
            &lt;span&gt;운영종료&lt;/span&gt;
          &lt;/div&gt;
          &lt;div class=&quot;marker-legend-item&quot;&gt;
            &lt;span class=&quot;marker-dot&quot; style=&quot;background:${statusMarkerColors.empty}&quot;&gt;&lt;/span&gt;
            &lt;span&gt;운영정보 없음&lt;/span&gt;
          &lt;/div&gt;
        `;
      } else {
        titleEl.textContent = &quot;확인용 핀 안내&quot;;
        listEl.innerHTML = `
          &lt;div class=&quot;marker-legend-item&quot;&gt;
            &lt;span class=&quot;marker-dot&quot; style=&quot;background:${checkMarkerColors.done}&quot;&gt;&lt;/span&gt;
            &lt;span&gt;1팀&lt;/span&gt;
          &lt;/div&gt;
          &lt;div class=&quot;marker-legend-item&quot;&gt;
            &lt;span class=&quot;marker-dot&quot; style=&quot;background:${checkMarkerColors.needCheck}&quot;&gt;&lt;/span&gt;
            &lt;span&gt;2팀&lt;/span&gt;
          &lt;/div&gt;
          &lt;div class=&quot;marker-legend-item&quot;&gt;
            &lt;span class=&quot;marker-dot&quot; style=&quot;background:${checkMarkerColors.notVisited}&quot;&gt;&lt;/span&gt;
            &lt;span&gt;3팀&lt;/span&gt;
          &lt;/div&gt;
          &lt;div class=&quot;marker-legend-item&quot;&gt;
            &lt;span class=&quot;marker-dot&quot; style=&quot;background:${checkMarkerColors.other}&quot;&gt;&lt;/span&gt;
            &lt;span&gt;기타&lt;/span&gt;
          &lt;/div&gt;
          &lt;div class=&quot;marker-legend-item&quot;&gt;
            &lt;span class=&quot;marker-dot&quot; style=&quot;background:${checkMarkerColors.empty}&quot;&gt;&lt;/span&gt;
            &lt;span&gt;빈칸&lt;/span&gt;
          &lt;/div&gt;
        `;
      }
    }

    function toggleMarkerLegend() {
      const legend = document.getElementById(&quot;markerLegend&quot;);
      const toggleBtn = document.getElementById(&quot;markerLegendToggle&quot;);

      if (!legend || !toggleBtn) return;

      const isHidden = legend.classList.contains(&quot;hidden&quot;);

      if (isHidden) {
        renderMarkerLegend();
        legend.classList.remove(&quot;hidden&quot;);
        toggleBtn.style.display = &quot;none&quot;;
      } else {
        legend.classList.add(&quot;hidden&quot;);
        toggleBtn.style.display = &quot;block&quot;;
      }
    }

    function refreshMarkerImages() {
      const orderedStores = [...storeMarkers].sort((a, b) =&gt; getPinPriority(a) - getPinPriority(b));

      orderedStores.forEach(store =&gt; {
        if (store.marker) {
          const isVisible = !!store.marker.getMap();
          store.marker.setMap(null);
          store.marker.setImage(getMarkerImage(store));
          store.marker.setMap(isVisible ? map : null);
        }
      });
    }

    function togglePinMode() {
      const button = document.getElementById(&quot;pinModeToggle&quot;);

      if (currentPinMode === &quot;check&quot;) {
        currentPinMode = &quot;open&quot;;
        button.textContent = &quot;확인중&quot;;
        button.classList.add(&quot;active&quot;);
      } else {
        currentPinMode = &quot;check&quot;;
        button.textContent = &quot;운영상태&quot;;
        button.classList.remove(&quot;active&quot;);
      }

      renderMarkerLegend();
      refreshMarkerImages();

      const selected = getSelectedStoreData();
      if (selected) {
        renderSelectedStore(selected);
        closeAllInfoWindows();
        openStoreInfo(selected);
      }
    }

    function getCurrentFilterValues() {
      return {
        keyword: normalizeText(document.getElementById(&quot;searchInput&quot;).value),
        brand: document.getElementById(&quot;brandFilter&quot;).value,
        region: document.getElementById(&quot;regionFilter&quot;).value,
        openFilter: document.getElementById(&quot;openFilter&quot;).value
      };
    }

    function getFilteredBaseStores(filters = {}) {
      const { keyword = &quot;&quot;, brand = &quot;&quot;, region = &quot;&quot;, openFilter = &quot;&quot; } = filters;
      let results = [...storesForFilter];

      if (brand) results = results.filter(store =&gt; store.brand === brand);
      if (region) results = results.filter(store =&gt; store.region === region);

      if (openFilter) {
        results = results.filter(store =&gt; {
          const status = getStoreStatus(store).status;
          if (openFilter === &quot;open&quot;) return status === &quot;운영중&quot;;
          if (openFilter === &quot;break&quot;) return status === &quot;브레이크타임&quot;;
          if (openFilter === &quot;closed&quot;) return status === &quot;미운영&quot;;
          if (openFilter === &quot;empty&quot;) return status === &quot;정보없음&quot;;
          return true;
        });
      }

      if (keyword) {
        results = results.filter(store =&gt; {
          const text = normalizeText(
            `${store.name} ${store.brand} ${store.address} ${store.detail_address} ${store.region} ${store.note} ${store.operating_hours} ${store.operating_days} ${store.break_time} ${store.phone}`
          );
          return text.includes(keyword);
        });
      }

      return results;
    }

    function getFilteredMarkerStores(filters = {}) {
      const baseResults = getFilteredBaseStores(filters);
      const names = new Set(baseResults.map(store =&gt; store.name));
      return storeMarkers.filter(store =&gt; names.has(store.name));
    }

    function renderFilterOptions() {
      const brandFilter = document.getElementById(&quot;brandFilter&quot;);
      const regionFilter = document.getElementById(&quot;regionFilter&quot;);

      const current = getCurrentFilterValues();

      const brands = createUniqueOptions(
        getFilteredBaseStores({
          keyword: current.keyword,
          region: current.region,
          openFilter: current.openFilter
        }).map(store =&gt; store.brand)
      );

      const regions = createUniqueOptions(
        getFilteredBaseStores({
          keyword: current.keyword,
          brand: current.brand,
          openFilter: current.openFilter
        }).map(store =&gt; store.region)
      );

      brandFilter.innerHTML = '&lt;option value=&quot;&quot;&gt;전체 확인용&lt;/option&gt;';
      regionFilter.innerHTML = '&lt;option value=&quot;&quot;&gt;전체 지역&lt;/option&gt;';

      brands.forEach(value =&gt; brandFilter.appendChild(new Option(value, value)));
      regions.forEach(value =&gt; regionFilter.appendChild(new Option(value, value)));

      if (brands.includes(current.brand)) brandFilter.value = current.brand;
      if (regions.includes(current.region)) regionFilter.value = current.region;
    }

    function renderRouteInfo() {
      document.getElementById(&quot;routeStartText&quot;).textContent = routeStartStore ? routeStartStore.name : &quot;선택 안 됨&quot;;
      document.getElementById(&quot;routeEndText&quot;).textContent = routeEndStore ? routeEndStore.name : &quot;선택 안 됨&quot;;
    }

    function renderSelectedStore(store) {
      const box = document.getElementById(&quot;selectedStore&quot;);

      if (!store) {
        box.innerHTML = `
          &lt;h2&gt;매장을 선택하세요&lt;/h2&gt;
          &lt;div class=&quot;row&quot;&gt;아래 목록이나 지도 핀을 누르면 상세 정보가 표시됩니다.&lt;/div&gt;
        `;
        return;
      }

      const statusInfo = getStoreStatus(store);
      const statusClass = getStatusClass(statusInfo.status);

      box.innerHTML = `
        &lt;div class=&quot;status-top ${statusClass}&quot;&gt;
          &lt;div class=&quot;status-sub&quot;&gt;${statusInfo.message}&lt;/div&gt;
        &lt;/div&gt;

        &lt;h2&gt;${store.name}&lt;/h2&gt;
        &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;label&quot;&gt;주소&lt;/span&gt;${store.address || &quot;-&quot;}&lt;/div&gt;
        &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;label&quot;&gt;상세주소&lt;/span&gt;${store.detail_address || &quot;-&quot;}&lt;/div&gt;
        &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;label&quot;&gt;운영요일&lt;/span&gt;${store.operating_days || &quot;-&quot;}&lt;/div&gt;
        &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;label&quot;&gt;운영시간&lt;/span&gt;${store.operating_hours || &quot;-&quot;}&lt;/div&gt;
        &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;label&quot;&gt;브레이크&lt;/span&gt;${store.break_time || &quot;-&quot;}&lt;/div&gt;
        &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;label&quot;&gt;전화&lt;/span&gt;${store.phone || &quot;-&quot;}&lt;/div&gt;
        &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;label&quot;&gt;확인용&lt;/span&gt;${store.brand || &quot;-&quot;}&lt;/div&gt;
        &lt;div class=&quot;row&quot;&gt;&lt;span class=&quot;label&quot;&gt;비고&lt;/span&gt;${store.note || &quot;-&quot;}&lt;/div&gt;
        &lt;div class=&quot;selected-actions&quot;&gt;
          &lt;button type=&quot;button&quot; onclick=&quot;setSelectedAsStart()&quot;&gt;출발지로 설정&lt;/button&gt;
          &lt;button type=&quot;button&quot; onclick=&quot;setSelectedAsEnd()&quot;&gt;도착지로 설정&lt;/button&gt;
        &lt;/div&gt;
      `;
    }

    function renderDefaultMessage() {
      renderSelectedStore(null);
    }

    function renderResultMessage(results) {
      document.getElementById(&quot;selectedStore&quot;).innerHTML = `
        &lt;h2&gt;검색 결과 ${results.length}개&lt;/h2&gt;
        &lt;div class=&quot;row&quot;&gt;아래 목록이나 지도 핀에서 원하는 매장을 선택하세요.&lt;/div&gt;
      `;
    }

    function renderNoResultMessage() {
      document.getElementById(&quot;selectedStore&quot;).innerHTML = `
        &lt;h2&gt;검색 결과 없음&lt;/h2&gt;
        &lt;div class=&quot;row&quot;&gt;조건에 맞는 매장이 없습니다.&lt;/div&gt;
      `;
    }

    function renderStoreList(items) {
      const list = document.getElementById(&quot;storeList&quot;);
      list.innerHTML = &quot;&quot;;

      const sortedItems = [...items].sort((a, b) =&gt;
        String(a.name || &quot;&quot;).localeCompare(String(b.name || &quot;&quot;), &quot;ko&quot;)
      );

      const fragment = document.createDocumentFragment();

      sortedItems.forEach(store =&gt; {
        const statusInfo = getStoreStatus(store);

        const div = document.createElement(&quot;div&quot;);
        div.className = &quot;store-item&quot; + (selectedStoreName === store.name ? &quot; active&quot; : &quot;&quot;);

        div.innerHTML = `
          &lt;div class=&quot;store-item-title&quot;&gt;${store.name}&lt;/div&gt;
          &lt;div class=&quot;store-item-meta&quot;&gt;지역: ${store.region || &quot;-&quot;}&lt;/div&gt;
          &lt;div class=&quot;store-item-meta&quot;&gt;주소: ${store.address || &quot;-&quot;}&lt;/div&gt;
          &lt;div class=&quot;store-item-meta&quot;&gt;상세주소: ${store.detail_address || &quot;-&quot;}&lt;/div&gt;
          &lt;div class=&quot;store-item-meta&quot;&gt;운영요일: ${store.operating_days || &quot;-&quot;}&lt;/div&gt;
          &lt;div class=&quot;store-item-meta&quot;&gt;운영시간: ${store.operating_hours || &quot;-&quot;}&lt;/div&gt;
          &lt;div class=&quot;store-item-meta&quot;&gt;브레이크: ${store.break_time || &quot;-&quot;}&lt;/div&gt;
          &lt;div class=&quot;store-item-meta&quot;&gt;전화: ${store.phone || &quot;-&quot;}&lt;/div&gt;

          &lt;div class=&quot;store-item-meta&quot;&gt;비고: ${store.note || &quot;-&quot;}&lt;/div&gt;
        `;

        div.addEventListener(&quot;click&quot;, function() {
          selectStore(store);
        });

        fragment.appendChild(div);

      list.appendChild(fragment);

    function updateMarkers(results, shouldFitBounds = false) {
      const bounds = new kakao.maps.LatLngBounds();

      storeMarkers.forEach(store =&gt; {
        const visible = results.includes(store);
        store.marker.setMap(visible ? map : null);
        if (visible) bounds.extend(store.coords);
      });

      if (results.length &gt; 0 &amp;&amp; shouldFitBounds) {
        map.setBounds(bounds);
      }
    }

    function closeOpenedInfowindow() {
      if (openedInfowindow) {
        openedInfowindow.close();
        openedInfowindow = null;
      }
    }

    function closeAllInfoWindows() {
      storeMarkers.forEach(store =&gt; {
        if (store.infowindow) store.infowindow.close();
      });
      openedInfowindow = null;
    }

    function clearSelectedStoreState(options = {}) {
      const { keepRoute = false } = options;

      closeAllInfoWindows();
      selectedStoreName = null;

      if (!keepRoute) {
        routeEndStore = null;
      }

      const currentResults = getFilteredMarkerStores(getCurrentFilterValues());
      renderStoreList(currentResults.length ? currentResults : storeMarkers);
      renderDefaultMessage();
      renderRouteInfo();
    }

    function handleInfoWindowClose() {
      clearSelectedStoreState();
    }

    function getSelectedStoreData() {
      return storeMarkers.find(store =&gt; store.name === selectedStoreName) || null;
    }

    function scrollMapIntoView() {
      if (!isMobileDevice()) return Promise.resolve();

      return new Promise(resolve =&gt; {
        mapWrapEl.scrollIntoView({
          behavior: &quot;smooth&quot;,
          block: &quot;start&quot;
        });
        setTimeout(resolve, 320);
      });
    }

    function getOffsetCenter(latlng, offsetY = 0) {
      const projection = map.getProjection();
      if (!projection) return latlng;

      const point = projection.pointFromCoords(latlng);
      const movedPoint = new kakao.maps.Point(point.x, point.y - offsetY);
      return projection.coordsFromPoint(movedPoint);
    }

    function moveMapToStore(store) {
      if (!store || !store.coords) return;

      map.relayout();

      if (isMobileDevice()) {
        map.setLevel(4);
        const movedCenter = getOffsetCenter(store.coords, 120);
        map.setCenter(movedCenter);
      } else {
        map.setLevel(3);
        map.setCenter(store.coords);
      }
    }

    function createInfoWindowContent(store, region) {
      const statusInfo = getStoreStatus(store);

      return `
        &lt;div class=&quot;info-box&quot;&gt;
          &lt;button type=&quot;button&quot; class=&quot;info-window-close&quot; onclick=&quot;handleInfoWindowClose()&quot;&gt;×&lt;/button&gt;
          &lt;h3&gt;${store.name}&lt;/h3&gt;
          &lt;div&gt;&lt;strong&gt;주소&lt;/strong&gt; &lt;span&gt;${store.address || &quot;-&quot;}&lt;/span&gt;&lt;/div&gt;
          &lt;div&gt;&lt;strong&gt;상세주소&lt;/strong&gt; &lt;span&gt;${store.detail_address || &quot;-&quot;}&lt;/span&gt;&lt;/div&gt;
          &lt;div&gt;&lt;strong&gt;안내&lt;/strong&gt; &lt;span&gt;${statusInfo.message}&lt;/span&gt;&lt;/div&gt;
          &lt;div&gt;&lt;strong&gt;운영요일&lt;/strong&gt; &lt;span&gt;${store.operating_days || &quot;-&quot;}&lt;/span&gt;&lt;/div&gt;
          &lt;div&gt;&lt;strong&gt;운영시간&lt;/strong&gt; &lt;span&gt;${store.operating_hours || &quot;-&quot;}&lt;/span&gt;&lt;/div&gt;
          &lt;div&gt;&lt;strong&gt;브레이크&lt;/strong&gt; &lt;span&gt;${store.break_time || &quot;-&quot;}&lt;/span&gt;&lt;/div&gt;
          &lt;div&gt;&lt;strong&gt;전화&lt;/strong&gt; &lt;span&gt;${store.phone || &quot;-&quot;}&lt;/span&gt;&lt;/div&gt;
          &lt;div&gt;&lt;strong&gt;확인용&lt;/strong&gt; &lt;span&gt;${store.brand || &quot;-&quot;}&lt;/span&gt;&lt;/div&gt;
          &lt;div&gt;&lt;strong&gt;비고&lt;/strong&gt; &lt;span&gt;${store.note || &quot;-&quot;}&lt;/span&gt;&lt;/div&gt;
        &lt;/div&gt;
      `;
    }

    function openStoreInfo(store) {
      if (!store || !store.marker) return;

      if (!store.infowindow) {
        store.infowindow = new kakao.maps.InfoWindow({
          content: createInfoWindowContent(store, store.region),
          removable: false
        });
      } else {
        store.infowindow.setContent(createInfoWindowContent(store, store.region));
      }

      closeAllInfoWindows();
      store.infowindow.open(map, store.marker);
      openedInfowindow = store.infowindow;
    }

    async function selectStore(store) {
      if (!store) return;

      selectedStoreName = store.name;
      renderSelectedStore(store);

      if (!routeEndStore) {
        routeEndStore = store;
        renderRouteInfo();
      }

      const currentResults = getFilteredMarkerStores(getCurrentFilterValues());
      renderStoreList(currentResults);

      closeOpenedInfowindow();

      await scrollMapIntoView();

      setTimeout(() =&gt; {
        moveMapToStore(store);
        setTimeout(() =&gt; {
          openStoreInfo(store);
        }, 120);
      }, 40);
    }

    function setSelectedAsStart() {
      const selectedStore = getSelectedStoreData();
      if (!selectedStore) {
        alert(&quot;먼저 매장을 선택해 주세요.&quot;);
        return;
      }
      routeStartStore = selectedStore;
      renderRouteInfo();
    }

    function setSelectedAsEnd() {
      const selectedStore = getSelectedStoreData();
      if (!selectedStore) {
        alert(&quot;먼저 매장을 선택해 주세요.&quot;);
        return;
      }
      routeEndStore = selectedStore;
      renderRouteInfo();
    }

    function clearRouteSelection() {
      routeStartStore = null;
      routeEndStore = null;
      renderRouteInfo();
    }

    function applyFilters() {
      if (storeMarkers.length === 0) {
        alert(&quot;매장 정보를 불러오는 중입니다. 잠시 후 다시 시도해 주세요.&quot;);
        return;
      }

      renderFilterOptions();
      const current = getCurrentFilterValues();
      const results = getFilteredMarkerStores(current);

      closeAllInfoWindows();

      if (!current.keyword &amp;&amp; !current.brand &amp;&amp; !current.region &amp;&amp; !current.openFilter) {
        selectedStoreName = null;
        updateMarkers(storeMarkers, false);
        renderStoreList(storeMarkers);
        renderDefaultMessage();
        return;
      }

      if (results.length === 0) {
        selectedStoreName = null;
        updateMarkers([], false);
        document.getElementById(&quot;storeList&quot;).innerHTML = &quot;&quot;;
        renderNoResultMessage();
        return;
      }

      if (selectedStoreName &amp;&amp; !results.some(store =&gt; store.name === selectedStoreName)) {
        selectedStoreName = null;
      }

      updateMarkers(results, true);
      renderStoreList(results);
      renderResultMessage(results);
    }

    function resetFilters() {
      document.getElementById(&quot;searchInput&quot;).value = &quot;&quot;;
      document.getElementById(&quot;brandFilter&quot;).value = &quot;&quot;;
      document.getElementById(&quot;regionFilter&quot;).value = &quot;&quot;;
      document.getElementById(&quot;openFilter&quot;).value = &quot;&quot;;

      selectedStoreName = null;
      closeAllInfoWindows();
      renderFilterOptions();
      updateMarkers(storeMarkers, false);
      renderStoreList(storeMarkers);
      renderDefaultMessage();
    }

    function toggleSidebar() {
      const toggleButton = document.getElementById(&quot;sidebarToggle&quot;);
      sidebarEl.classList.toggle(&quot;collapsed&quot;);
      toggleButton.textContent = sidebarEl.classList.contains(&quot;collapsed&quot;) ? &quot;필터 열기&quot; : &quot;필터 닫기&quot;;
      relayoutMapSafely();
    }

    function openRoadviewAtPosition(position, titleText = &quot;로드뷰&quot;) {
      const wrap = document.getElementById(&quot;roadviewWrap&quot;);
      const toggleBtn = document.getElementById(&quot;roadviewToggle&quot;);
      const title = document.getElementById(&quot;roadviewTitle&quot;);

      roadviewClient.getNearestPanoId(position, 50, function(panoId) {
        if (!panoId) {
          alert(&quot;이 위치 근처에는 로드뷰가 없습니다.&quot;);
          return;
        }

        title.textContent = titleText;
        wrap.classList.add(&quot;open&quot;);
        toggleBtn.textContent = &quot;로드뷰 닫기&quot;;
        roadview.setPanoId(panoId, position);

        setTimeout(() =&gt; {
          roadview.relayout();
        }, 100);
      });
    }

    function openRoadviewForStore(store) {
      currentRoadviewStore = store;
      openRoadviewAtPosition(store.coords, `${store.name} 로드뷰`);
    }

    function closeRoadviewPanel() {
      const wrap = document.getElementById(&quot;roadviewWrap&quot;);
      const toggleBtn = document.getElementById(&quot;roadviewToggle&quot;);
      wrap.classList.remove(&quot;open&quot;);
      toggleBtn.textContent = &quot;로드뷰&quot;;
    }

    function toggleRoadviewPanel() {
      const wrap = document.getElementById(&quot;roadviewWrap&quot;);

      if (wrap.classList.contains(&quot;open&quot;)) {
        closeRoadviewPanel();
        return;
      }

      const selectedStore = getSelectedStoreData();
      if (!selectedStore) {
        alert(&quot;먼저 매장을 선택해 주세요.&quot;);
        return;
      }

      openRoadviewForStore(selectedStore);
    }

    function toggleRoadviewSize() {
      const wrap = document.getElementById(&quot;roadviewWrap&quot;);
      const expandBtn = document.getElementById(&quot;roadviewExpandBtn&quot;);

      isRoadviewExpanded = !isRoadviewExpanded;
      wrap.classList.toggle(&quot;expanded&quot;, isRoadviewExpanded);
      expandBtn.textContent = isRoadviewExpanded ? &quot;작게 보기&quot; : &quot;크게 보기&quot;;

      setTimeout(() =&gt; {
        roadview.relayout();
      }, 200);
    }

    function createRoadviewPickerOverlay() {
      const content = document.createElement(&quot;div&quot;);
      content.className = &quot;roadview-picker-pin&quot;;

      return new kakao.maps.CustomOverlay({
        content,
        position: map.getCenter(),
        xAnchor: 0.5,
        yAnchor: 1
      });
    }

    function startRoadviewPickMode() {
      isRoadviewPickMode = true;
      isRoadviewPickerVisible = true;

      const button = document.getElementById(&quot;roadviewPickToggle&quot;);
      button.classList.add(&quot;active&quot;);
      button.textContent = &quot;찍기 종료&quot;;

      map.addOverlayMapTypeId(kakao.maps.MapTypeId.ROADVIEW);

      if (!roadviewPickerOverlay) {
        roadviewPickerOverlay = createRoadviewPickerOverlay();
      }

      roadviewPickerOverlay.setPosition(map.getCenter());
      roadviewPickerOverlay.setMap(map);
    }

    function stopRoadviewPickMode() {
      isRoadviewPickMode = false;
      isRoadviewPickerVisible = false;

      const button = document.getElementById(&quot;roadviewPickToggle&quot;);
      button.classList.remove(&quot;active&quot;);
      button.textContent = &quot;찍기&quot;;

      map.removeOverlayMapTypeId(kakao.maps.MapTypeId.ROADVIEW);

      if (roadviewPickerOverlay) {
        roadviewPickerOverlay.setMap(null);
      }
    }

    function toggleRoadviewPickMode() {
      if (isRoadviewPickMode) {
        stopRoadviewPickMode();
      } else {
        startRoadviewPickMode();
      }
    }

    function resetMapData() {
      markersBuildTaskId += 1;
      closeAllInfoWindows();

      storeMarkers.forEach(store =&gt; {
        if (store.marker) store.marker.setMap(null);
      });

      storeMarkers = [];
      openedInfowindow = null;
      selectedStoreName = null;
      currentRoadviewStore = null;
      routeStartStore = null;
      routeEndStore = null;

      document.getElementById(&quot;storeList&quot;).innerHTML = &quot;&quot;;
      renderDefaultMessage();
      renderRouteInfo();
    }

    function hasValidCoords(store) {
      return (
        store.lat !== undefined &amp;&amp;
        store.lng !== undefined &amp;&amp;
        store.lat !== null &amp;&amp;
        store.lng !== null &amp;&amp;
        String(store.lat).trim() !== &quot;&quot; &amp;&amp;
        String(store.lng).trim() !== &quot;&quot;
      );
    }

    function buildStoreMarker(store, coords) {
      const region = extractRegion(store.address);

      const marker = new kakao.maps.Marker({
        position: coords,
        image: getMarkerImage(store)
      });

      marker.setMap(map);

      const storeData = {
        ...store,
        region,
        coords,
        marker,
        infowindow: null
      };

      kakao.maps.event.addListener(marker, &quot;click&quot;, function() {
        selectStore(storeData);
      });

      storeMarkers.push(storeData);
    }

    function buildMarkersInChunks(validStores, chunkSize = 40) {
      validStores.sort((a, b) =&gt; getPinPriority(a) - getPinPriority(b));

      const taskId = markersBuildTaskId;
      let index = 0;

      function processChunk() {
        if (taskId !== markersBuildTaskId) return;

        const end = Math.min(index + chunkSize, validStores.length);

        for (let i = index; i &lt; end; i++) {
          const store = validStores[i];
          const coords = new kakao.maps.LatLng(Number(store.lat), Number(store.lng));
          buildStoreMarker(store, coords);
        }

        index = end;

        if (index &lt; validStores.length) {
          requestAnimationFrame(processChunk);
        } else {
          updateMarkers(storeMarkers, false);
          relayoutMapSafely();
        }
      }

      requestAnimationFrame(processChunk);
    }

    function initializeStores() {
      resetMapData();
      rebuildStoresForFilter();
      renderMarkerLegend();

      if (!stores.length) {
        renderFilterOptions();
        renderRouteInfo();
        renderStoreList([]);
        renderNoResultMessage();
        return;
      }

      renderFilterOptions();
      renderRouteInfo();
      renderStoreList(storesForFilter);
      renderDefaultMessage();

      const validStores = stores.filter(hasValidCoords);
      buildMarkersInChunks(validStores, 40);
    }

    async function loadStoresFromSheet() {
      if (!SHEET_API_URL) {
        alert(&quot;SHEET_API_URL을 먼저 입력해 주세요.&quot;);
        return;
      }

      try {
        const response = await fetch(SHEET_API_URL, { cache: &quot;no-store&quot; });
        const data = await response.json();

        stores = Array.isArray(data) ? data.map(store =&gt; ({
          ...store,
          detail_address: store.detail_address ?? &quot;&quot;,
          operating_days: store.operating_days ?? &quot;&quot;,
          operating_hours: store.operating_hours ?? store.hours ?? store.business_hours ?? &quot;&quot;,
          break_time: store.break_time ?? store.breakTime ?? &quot;&quot;,
          lat: store.lat ?? store.latitude ?? &quot;&quot;,
          lng: store.lng ?? store.longitude ?? &quot;&quot;
        })) : [];

        initializeStores();
      } catch (error) {
        console.error(&quot;매장 데이터 불러오기 실패:&quot;, error);
        alert(&quot;구글시트 매장 데이터를 불러오지 못했습니다.&quot;);
      }
    }

    function startNavigationFromRoute() {
      const destinationStore = routeEndStore || getSelectedStoreData();

      if (!destinationStore) {
        alert(&quot;도착지로 사용할 매장을 먼저 선택하거나 설정해 주세요.&quot;);
        return;
      }

      if (!window.Kakao) {
        alert(&quot;카카오 SDK가 로드되지 않았습니다.&quot;);
        return;
      }

      if (!Kakao.isInitialized()) {
        try {
          Kakao.init(&quot;여기에_카카오_자바스크립트키&quot;);
        } catch (error) {
          console.error(error);
          alert(&quot;카카오 SDK 초기화에 실패했습니다.&quot;);
          return;
        }
      }

      if (!Kakao.Navi || typeof Kakao.Navi.start !== &quot;function&quot;) {
        alert(&quot;카카오내비 기능을 사용할 수 없습니다. SDK 설정을 확인해 주세요.&quot;);
        return;
      }

      if (isMobileDevice()) {
        const naviOptions = {
          name: destinationStore.name,
          x: Number(destinationStore.coords.getLng()),
          y: Number(destinationStore.coords.getLat()),
          coordType: &quot;wgs84&quot;,
          vehicleType: 1,
          rpOption: 100
        };

        if (routeStartStore) {
          naviOptions.sX = Number(routeStartStore.coords.getLng());
          naviOptions.sY = Number(routeStartStore.coords.getLat());
        }

        try {
          Kakao.Navi.start(naviOptions);
        } catch (error) {
          console.error(&quot;Kakao.Navi.start error:&quot;, error);
          alert(&quot;카카오내비 실행에 실패했습니다. 카카오 디벨로퍼스에 현재 접속 도메인이 등록되어 있는지 확인해 주세요.&quot;);
        }
      } else {
        alert(&quot;카카오내비 길찾기는 모바일에서만 실행됩니다.&quot;);
      }
    }

    kakao.maps.event.addListener(map, &quot;mousemove&quot;, function(mouseEvent) {
      if (!isRoadviewPickMode || !roadviewPickerOverlay || !isRoadviewPickerVisible) return;
      roadviewPickerOverlay.setPosition(mouseEvent.latLng);
    });

    kakao.maps.event.addListener(map, &quot;click&quot;, function(mouseEvent) {
      if (!isRoadviewPickMode) return;

      const clickedPosition = mouseEvent.latLng;

      if (roadviewPickerOverlay) {
        roadviewPickerOverlay.setPosition(clickedPosition);
        roadviewPickerOverlay.setMap(null);
      }

      isRoadviewPickerVisible = false;
      openRoadviewAtPosition(clickedPosition, &quot;선택 위치 로드뷰&quot;);
    });

    document.getElementById(&quot;searchInput&quot;).addEventListener(&quot;keyup&quot;, function(event) {
      if (event.key === &quot;Enter&quot;) applyFilters();
    });

    window.addEventListener(&quot;load&quot;, function() {
      relayoutMapSafely();
    });

    window.addEventListener(&quot;resize&quot;, function() {
      relayoutMapSafely();
    });

    window.addEventListener(&quot;orientationchange&quot;, function() {
      relayoutMapSafely();
    });

    document.addEventListener(&quot;visibilitychange&quot;, function() {
      if (!document.hidden) relayoutMapSafely();
    });

    loadStoresFromSheet();
  &lt;/script&gt;
&lt;/body&gt;
&lt;/html&gt;"></iframe>
  </div>

  <script>
    function showMap(targetId) {
      document.querySelectorAll('.map-frame').forEach(function(frame) {
        frame.classList.toggle('active', frame.id === targetId);
      });
      document.getElementById('tab2').classList.toggle('active', targetId === 'map2');
      document.getElementById('tab1').classList.toggle('active', targetId === 'map1');
    }
  </script>
</body>
</html>
